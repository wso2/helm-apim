{{- if and .Values.kubernetes.gatewayAPI.enabled .Values.kubernetes.gatewayAPI.management.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ template "am-all-in-one.fullname" . }}-management-httproute
  namespace: {{ .Release.Namespace }}
{{- if .Values.kubernetes.gatewayAPI.management.annotations }}
  annotations:
{{ toYaml .Values.kubernetes.gatewayAPI.management.annotations | indent 4 }}
{{- end }}
spec:
  parentRefs:
  - name: {{ .Values.kubernetes.gatewayAPI.gatewayName }}
    sectionName: control-plane-https
  hostnames:
  - {{ .Values.kubernetes.gatewayAPI.management.hostname }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: {{ template "am-all-in-one.fullname" . }}-am-service
      port: {{ add 9443 (.Values.wso2.apim.portOffset | default 0) }}
    {{- if .Values.kubernetes.gatewayAPI.management.filters }}
    filters:
{{ toYaml .Values.kubernetes.gatewayAPI.management.filters | indent 4 }}
    {{- end }}
{{- end }}

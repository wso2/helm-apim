{{- if .Values.kubernetes.route.gateway.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ template "apim-helm-gw.fullname" . }}-gateway-route
  namespace: {{ .Release.Namespace }}
{{- if .Values.kubernetes.route.gateway.annotations }}
  annotations:
{{ toYaml .Values.kubernetes.route.gateway.annotations | indent 4 }}
{{- end }}
spec:
  host: {{ .Values.kubernetes.route.gateway.hostname }}
  port:
    targetPort: {{ add 8243 .Values.wso2.apim.portOffset }}
  tls:
    termination: {{ .Values.kubernetes.route.tls.termination | quote }}
    insecureEdgeTerminationPolicy: {{ .Values.kubernetes.route.tls.insecureEdgeTerminationPolicy | quote }}
    {{- if ne .Values.kubernetes.route.tls.termination "passthrough" }}
    {{- if and .Values.kubernetes.route.tls.certificate .Values.kubernetes.route.tls.key }}
    certificate: {{ .Values.kubernetes.route.tls.certificate | quote }}
    key: {{ .Values.kubernetes.route.tls.key | quote }}
    destinationCACertificate: {{ .Values.kubernetes.route.tls.destinationCACertificate | quote }}
    {{- else }}
    {{- fail "TLS certificate and key must be provided when termination type is not 'passthrough'." }}
    {{- end }}
    {{- end }}
  to:
    kind: Service
    name: {{ template "apim-helm-gw.fullname" . }}-service
    weight: 100
  wildcardPolicy: None
{{- end -}}

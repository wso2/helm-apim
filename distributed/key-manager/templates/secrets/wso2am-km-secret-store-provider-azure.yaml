apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Values.azure.keyVault.secretProviderClass }}
spec:
  provider: azure
  parameters:
    keyvaultName: {{ .Values.azure.keyVault.name }}
    userAssignedIdentityID: "{{ .Values.azure.keyVault.activeDirectory.servicePrincipal.appId }}"
    objects: |
      array:
        - |
          objectName: {{ if eq .Values.wso2.apim.configurations.encryption.internalCryptoProvider "org.wso2.carbon.crypto.provider.SymmetricKeyInternalCryptoProvider" }}{{ .Values.azure.keyVault.secretIdentifiers.secretEncryptionKey }}{{ else }}{{ .Values.azure.keyVault.secretIdentifiers.internalKeystorePassword }}{{ end }}
          objectType: secret
          objectVersion: ""
        {{- if ne .Values.wso2.apim.configurations.encryption.internalCryptoProvider "org.wso2.carbon.crypto.provider.SymmetricKeyInternalCryptoProvider" }}
        - |
          objectName: {{ .Values.azure.keyVault.secretIdentifiers.internalKeystoreKeyPassword }}
          objectType: secret
          objectVersion: ""
        {{- end }}
    tenantId: {{ .Values.azure.keyVault.activeDirectory.tenantId }}
    resourceGroup: {{ .Values.azure.keyVault.resourceManager.resourceGroup }}
    subscriptionId: {{ .Values.azure.keyVault.resourceManager.subscriptionId }}
{{- end }}

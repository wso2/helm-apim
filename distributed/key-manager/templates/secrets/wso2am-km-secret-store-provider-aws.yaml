apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Values.aws.secretsManager.secretProviderClass }}
  namespace: {{ .Release.Namespace }}
spec:
  provider: aws
  parameters:
    region: {{ .Values.aws.region }}
    objects: |
        - objectName: {{ if eq .Values.wso2.apim.configurations.encryption.internalCryptoProvider "org.wso2.carbon.crypto.provider.SymmetricKeyInternalCryptoProvider" }}{{ .Values.aws.secretsManager.secretIdentifiers.secretEncryptionKey.secretName | quote }}{{ else }}{{ .Values.aws.secretsManager.secretIdentifiers.internalKeystorePassword.secretName | quote }}{{ end }}
          objectType: "secretsmanager"
          jmesPath:
            - path: {{ if eq .Values.wso2.apim.configurations.encryption.internalCryptoProvider "org.wso2.carbon.crypto.provider.SymmetricKeyInternalCryptoProvider" }}{{ .Values.aws.secretsManager.secretIdentifiers.secretEncryptionKey.secretKey }}{{ else }}{{ .Values.aws.secretsManager.secretIdentifiers.internalKeystorePassword.secretKey }}{{ end }}
              objectAlias: {{ if eq .Values.wso2.apim.configurations.encryption.internalCryptoProvider "org.wso2.carbon.crypto.provider.SymmetricKeyInternalCryptoProvider" }}{{ .Values.aws.secretsManager.secretIdentifiers.secretEncryptionKey.secretKey }}{{ else }}{{ .Values.aws.secretsManager.secretIdentifiers.internalKeystorePassword.secretKey }}{{ end }}
{{- end }}
